<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    
    <title>Discordサーバーへの招待</title>
    <meta property="og:title" content="サーバーに参加して一緒に話そう！" />
    
    <meta property="og:description" content="ここをクリックしてDiscordサーバーに参加してください。どなたでも歓迎です！" />
    
    <meta property="og:image" content="https://cdn.discordapp.com/icons/1369608160289099839/c02bee314acfaf67eeadf72cc0cd83a0.png?size=512" />
    
    <meta name="twitter:card" content="summary_large_image" />
    
    <meta http-equiv="refresh" content="0;URL='ここにDiscordの招待URLを入れる'" />

    <style>
        body { font-family: sans-serif; background-color: #fffcfd; text-align: center; padding-top: 100px; color: #5d5d5d; }
        .loading-text { font-size: 18px; font-weight: bold; color: #ffb7ce; }
    </style>
</head>
<body>
    <div class="loading-text">Discordへ移動中です...</div>
    <p>画面が切り替わらない場合は <a href="ここにDiscordの招待URLを入れる">こちらをクリック</a> してください。</p>

    <script>
        // JavaScriptでも念のため自動転送をかけます
        window.location.href = "ここにDiscordの招待URLを入れる";
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <script>
        const discordUrl = "https://discord.gg/7kmuNbjw"; 
    </script>
    <title>JOJI民の公園／fanServer</title>
    <meta property="og:title" content="JOJI民の公園／fanServer" />
    <meta property="og:description" content="作業しながら雑談など！あそびにきてください" />
    <meta property="og:image" content="https://cdn.discordapp.com/icons/1369608160289099839/c02bee314acfaf67eeadf72cc0cd83a0.png?size=512" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
        window.onload = function() {
            setTimeout(function() {
                window.location.href = discordUrl;
            }, 500);
        };
    </script>
    <style>
        body { font-family: sans-serif; background-color: #fffcfd; text-align: center; padding-top: 100px; color: #5d5d5d; margin: 0; }
        .loading-text { font-size: 18px; font-weight: bold; color: #ffb7ce; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #ffb7ce; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="loading-text">Discordへ移動中...</div>
    <p>自動（じどう）で切り替わらない場合はボタンを押してください。</p>
    <a id="jumpBtn" class="btn" href="${discordUrl}">サーバーに参加する</a>
</body>
</html>
